{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="contact-page">

    <!-- Header -->
      <div class="res-hero">
        <div class="res-hero-text">
          <p class="res-hero-eyebrow">Help</p>
          <h1 class="res-hero-title">Contact Us</h1>
          <p class="res-hero-sub">Have a question, suggestion, or need support? We’d love to hear from you.</p>
        </div>
          <img src="{% static 'images/contact-hero.png' %}" alt="" class="contact-hero-img">
      </div>

    <!-- Card -->
    <div class="contact-card">

      <form class="contact-form">

        <div class="form-group">
          <label>Name</label>
          <input type="text" placeholder="Your name">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea rows="5" placeholder="Write your message..."></textarea>
        </div>

        <button class="btn btn-primary" type="submit">Send Message</button>

      </form>

    </div>

    <p class="contact-note">
      This form is for demonstration purposes in the academic version.
    </p>


</div>

{% endblock %}
